services:
  - type: web
    name: vigility-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vigility-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: vigility-db
    databaseName: vigility
    user: vigility_user
